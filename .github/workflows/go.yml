name: Go Build and Test

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.7'

    - name: Run tests
      run: make test-all

    - name: Check test coverage
      run: |
        go test -coverprofile=coverage.out ./...
        coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Coverage: ${coverage}%"
        if [ $(echo "$coverage < 50" | bc) -eq 1 ]; then
          echo "Warning: Coverage below 50%"
        fi

    - name: Run fuzz tests
      run: |
        go test -fuzz=FuzzSanitizeFilename -fuzztime=10s
        go test -fuzz=FuzzProcessObject -fuzztime=10s
        go test -fuzz=FuzzParseFilterList -fuzztime=10s

    - name: Run go fmt check
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Code is not formatted. Run 'make fmt'"
          gofmt -s -l .
          exit 1
        fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.7'

    - name: Build all platforms
      run: make build

    - name: Generate checksums
      run: |
        cd bin
        sha256sum k8s-yaml-splitter-*-amd64 > checksums.txt

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: |
          bin/k8s-yaml-splitter-*-amd64
          bin/checksums.txt

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: binaries
        path: bin/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          bin/k8s-yaml-splitter-linux-amd64
          bin/k8s-yaml-splitter-darwin-amd64
          bin/k8s-yaml-splitter-freebsd-amd64
          bin/checksums.txt
        body_path: RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
